version: "3.9"
services:
  db:
    image: postgres:16
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: gunicorn satellite_app.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    environment:
      DJANGO_DEBUG: "0"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: celery -A satellite_app worker -l info
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    volumes:
      - static_files:/app/static:ro
      - media_files:/app/media:ro        # :ro (read-only)
    depends_on:
      - web
    env_file:
      - .env
    
volumes:
  db_data:
  static_files:
  media_files:

