version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-satellite}
      POSTGRES_USER: ${POSTGRES_USER:-sat_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sat_pass}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sat_user} -d ${POSTGRES_DB:-satellite}"]
      interval: 5s
      timeout: 3s
      retries: 10
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret}
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,web,host.docker.internal"
      DATABASE_URL: postgres://${POSTGRES_USER:-sat_user}:${POSTGRES_PASSWORD:-sat_pass}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-satellite}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: celery -A satellite_app worker -l info
    volumes:
      - ./backend:/app
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret}
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://${POSTGRES_USER:-sat_user}:${POSTGRES_PASSWORD:-sat_pass}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-satellite}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    # this block is optional (for dev only)
    # environment:
    #   # in Vite, every env var with VITE_ prefix is automatically exposed to the frontend
    #   VITE_API_BASE: http://web:8000 # for containerized dev
    depends_on:
      - web

volumes:
  db_data:

